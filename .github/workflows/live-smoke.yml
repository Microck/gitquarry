name: Live Smoke

on:
  workflow_dispatch:

concurrency:
  group: live-smoke-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  live-e2e:
    runs-on: ubuntu-latest
    env:
      LIVE_TOKEN: ${{ secrets.GITQUARRY_TOKEN }}
    steps:
      - name: Check token availability
        id: token-check
        run: |
          if [ -n "${LIVE_TOKEN:-}" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Explain skipped run
        if: steps.token-check.outputs.has_token != 'true'
        run: echo "GITQUARRY_TOKEN secret is not configured; skipping live smoke."

      - name: Checkout
        if: steps.token-check.outputs.has_token == 'true'
        uses: actions/checkout@v6.0.2

      - name: Install Rust
        if: steps.token-check.outputs.has_token == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        if: steps.token-check.outputs.has_token == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Build binary
        if: steps.token-check.outputs.has_token == 'true'
        run: cargo build --locked

      - name: Run live smoke checks
        if: steps.token-check.outputs.has_token == 'true'
        run: |
          set -euo pipefail
          TMPDIR="$(mktemp -d)"
          trap 'rm -rf "$TMPDIR"' EXIT

          GITQUARRY_TOKEN="$LIVE_TOKEN" target/debug/gitquarry auth status
          GITQUARRY_TOKEN="$LIVE_TOKEN" target/debug/gitquarry search "rust cli" --limit 2 --format json > "$TMPDIR/search.json"
          GITQUARRY_TOKEN="$LIVE_TOKEN" target/debug/gitquarry inspect rust-lang/rust --format json > "$TMPDIR/inspect.json"

          printf '%s' "$LIVE_TOKEN" | \
            GITQUARRY_CONFIG_DIR="$TMPDIR" \
            GITQUARRY_ALLOW_INSECURE_STORAGE=1 \
            target/debug/gitquarry auth login --token-stdin

          GITQUARRY_CONFIG_DIR="$TMPDIR" \
          GITQUARRY_ALLOW_INSECURE_STORAGE=1 \
          target/debug/gitquarry auth status

          GITQUARRY_CONFIG_DIR="$TMPDIR" \
          GITQUARRY_ALLOW_INSECURE_STORAGE=1 \
          target/debug/gitquarry search "rust cli" --limit 1 --format compact > "$TMPDIR/persisted-search.json"

          jq -e '.items | length > 0' "$TMPDIR/search.json" > /dev/null
          jq -e '.repository.full_name == "rust-lang/rust"' "$TMPDIR/inspect.json" > /dev/null
          jq -e '.items | length == 1' "$TMPDIR/persisted-search.json" > /dev/null
